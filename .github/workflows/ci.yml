name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Fake credentials for CI — conftest.py monkeypatches these anyway
          AZURE_TENANT_ID: ci-tenant
          AZURE_CLIENT_ID: ci-client
          AZURE_CLIENT_SECRET: ci-secret
          SHAREPOINT_SITE_URL: https://contoso.sharepoint.com/sites/ci
          DROPBOX_APP_KEY: ci-key
          DROPBOX_APP_SECRET: ci-secret
          DROPBOX_REFRESH_TOKEN: ci-token
        run: pytest --tb=short -q

      - name: Check import structure
        run: python -c "from src.sharepoint.list_manager import SharePointListManager; print('imports OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ scripts/ tests/

